spring.profiles.active=test
spring.datasource.url=jdbc:h2:mem:test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
# Disable Spring Security auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.SecurityAutoConfiguration,\
org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration,\
org.springframework.boot.security.autoconfigure.web.servlet.ServletWebSecurityAutoConfiguration,\
org.springframework.boot.security.oauth2.server.resource.autoconfigure.web.OAuth2ResourceServerWebSecurityAutoConfiguration,\
org.springframework.boot.security.oauth2.server.resource.autoconfigure.OAuth2ResourceServerAutoConfiguration

spring.jpa.hibernate.ddl-auto=none

spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/test
spring.flyway.clean-disabled=false
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

jwt.token-validity-in-seconds=86400
jwt.base64-secret=0rtv2b8Obh8xRlXwsToK6kdvHQepA713Vv+Yy6c+9bENTzie0Cq2+a0cuu89e/wP9dR93alkuyaYz7IZmUE2pQ==

jwt.auth.client-id=dyma-tennis-api
jwt.auth.principal-attribute=preferred_username

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8090/realms/dyma
spring.security.oauth2.resourceserver.jwk.set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs